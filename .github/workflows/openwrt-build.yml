name: OpenWrt固件构建测试

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  # 允许手动触发
    inputs:
      target_arch:
        description: '目标架构 (例如: x86_64, ramips/mt7621)'
        required: false
        default: 'x86_64'

env:
  # 编译配置
  JOBS: 4  # 并行编译任务数，根据runner配置调整

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: 设置编译环境
      run: |
        echo "=== 设置OpenWrt编译环境 ==="
        sudo apt-get update
        sudo apt-get install -y \
          build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
          python3-dev rsync subversion swig time unzip wget xsltproc zlib1g-dev \
          gcc-multilib flex bison
        
        # 设置ccache
        sudo mkdir -p /usr/local/ccache
        sudo chmod 777 /usr/local/ccache
        echo "CCACHE_DIR=/usr/local/ccache" >> $GITHUB_ENV
        echo "CCACHE_TEMPDIR=/tmp/ccache-tmp" >> $GITHUB_ENV
        ccache --max-size=2G
        ccache --set-config=sloppiness=file_macro,locale,time_macros
    
    - name: 配置feeds
      run: |
        echo "=== 配置feeds ==="
        cp feeds.conf.default feeds.conf
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "Feeds配置完成"
    
    - name: 配置编译目标 (${{ matrix.target }})
      run: |
        echo "=== 配置目标架构: ${{ matrix.target }} ==="
        
        if [ "${{ matrix.target }}" = "x86_64" ]; then
          # x86_64通用配置
          cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_DEVICE_generic=y
CONFIG_TARGET_ROOTFS_EXT4FS=y
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_wpad-openssl=y
EOF
        fi
        
        # 显示配置摘要
        echo "配置摘要:"
        grep "^CONFIG_" .config | head -20 || true
    
    - name: 下载编译依赖
      run: |
        echo "=== 下载编译依赖 ==="
        make defconfig
        make download -j${{ env.JOBS }} || make download -j1
        echo "依赖下载完成"
    
    - name: 编译测试
      timeout-minutes: 60
      run: |
        echo "=== 开始编译测试 ==="
        echo "使用 ${{ env.JOBS }} 个并行任务"
        echo "CCACHE状态:"
        ccache -s
        
        # 开始编译，限制输出避免日志过大
        set +e
        make -j${{ env.JOBS }} V=s 2>&1 | tee /tmp/build.log | tail -100
        BUILD_EXIT=$?
        set -e
        
        echo "=== 编译完成，退出码: $BUILD_EXIT ==="
        
        # 检查编译结果
        if [ $BUILD_EXIT -eq 0 ]; then
          echo "✅ 编译成功！"
          if [ -d bin/targets ]; then
            echo "生成的文件:"
            find bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" | head -10
            echo "固件大小统计:"
            find bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" -exec du -h {} \; | head -10
          fi
        else
          echo "⚠️ 编译过程有错误"
          echo "最后100行错误日志:"
          tail -100 /tmp/build.log | grep -i "error\|failed\|undefined" || tail -50 /tmp/build.log
        fi
    
    - name: 上传编译日志 (如果失败)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ matrix.target }}
        path: /tmp/build.log
    
    - name: 上传生成的固件 (如果成功)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.target }}
        path: bin/targets/

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 代码质量检查
      run: |
        echo "=== 代码质量检查 ==="
        
        # 1. 检查shell脚本语法
        echo "检查shell脚本语法..."
        find . -name "*.sh" -type f | while read file; do
          if bash -n "$file" 2>/dev/null; then
            echo "  ✅ $file"
          else
            echo "  ❌ $file: 语法错误"
            bash -n "$file" 2>&1 | head -5
          fi
        done | head -20
        
        # 2. 检查Makefile基本语法
        echo "检查Makefile基本语法..."
        find . -name "Makefile" -o -name "*.mk" | head -10 | while read file; do
          if make -n -f "$file" 2>/dev/null | head -5 >/dev/null; then
            echo "  ✅ $file"
          else
            echo "  ⚠️ $file: 可能需要特定环境"
          fi
        done
        
        # 3. 检查文件编码和行尾
        echo "检查文件格式..."
        if find . -name "*.sh" -o -name "*.mk" -o -name "Makefile" | xargs file | grep -q "CRLF"; then
          echo "  ⚠️ 发现Windows行尾(CRLF)文件"
        else
          echo "  ✅ 行尾格式正常"
        fi
        
        echo "✅ 代码质量检查完成"

  summary:
    runs-on: ubuntu-latest
    needs: [build-test, code-quality]
    if: always()
    steps:
    - name: 生成测试报告
      run: |
        echo "=== OpenWrt CI测试报告 ==="
        echo "测试时间: $(date)"
        echo "仓库: djbaozi/immortalwrt"
        echo "触发事件: ${{ github.event_name }}"
        echo "提交: ${{ github.sha }}"
        echo ""
        echo "测试结果:"
        echo "- 构建测试: ${{ needs.build-test.result }}"
        echo "- 代码质量: ${{ needs.code-quality.result }}"
        echo ""
        echo "详细信息请查看各job日志"
        echo "=========================="